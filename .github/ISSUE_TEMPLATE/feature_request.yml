name: Feature request
description: Suggest an idea or improvement for Jelly Shark
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or friction you're hitting, not just the solution.
      placeholder: When browsing a large movie library, I can't jump to a letter…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform relevance
      options:
        - Apple TV (tvOS)
        - Apple Vision Pro (visionOS)
        - Both
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, or how other clients handle this.
    validations:
      required: false
